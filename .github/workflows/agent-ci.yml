name: Agent Skill Validation

on:
  push:
    paths:
      - '.ai/**'
      - 'scripts/**'
  pull_request:
    paths:
      - '.ai/**'

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linting Tools
        run: npm install prettier markdownlint-cli --no-save || true


      - name: Check Formatting
        run: npm run format:check

      - name: Lint Markdown Skills
        run: npm run lint


      - name: Validate AI Skills
        run: npm run validate:skills

      - name: Verify Script Permissions
        run: npm run validate:scripts